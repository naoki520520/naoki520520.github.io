name: Test ETF Dividend Sources

on:
  workflow_dispatch:

jobs:
  test-dividend-sources:
    runs-on: ubuntu-latest
    steps:
      - name: Search API clues in official pages
        run: |
          python - <<'PY'
          import re
          import urllib.parse
          import urllib.request

          SOURCES = {
              "0056_Yuanta": "https://www.yuantafunds.com/myfund/dividend/history?fundid=1084",
              "00878_Cathay": "https://www.cathaysite.com.tw/ETF/detail/ECN?tab=etf5",
              "00919_Capital": "https://www.capitalfund.com.tw/etf/product/detail/195/interest",
          }

          CLUE_WORDS = [
              "api", "ajax", "json", "dividend", "Dividend", "fundid", "FundId",
              "配息", "收益分配", "除息", "發放", "interest", "distribution",
              "ECN", "1084", "195"
          ]

          headers = {
              "User-Agent": "Mozilla/5.0",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Accept-Language": "zh-TW,zh;q=0.9,en;q=0.8",
          }

          def fetch(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=25) as res:
                  raw = res.read()
              return raw.decode("utf-8", errors="ignore")

          def unique(seq):
              seen = set()
              out = []
              for x in seq:
                  if x not in seen:
                      seen.add(x)
                      out.append(x)
              return out

          for name, url in SOURCES.items():
              print("=" * 100)
              print(name)
              print(url)

              try:
                  html = fetch(url)
                  base = url

                  print("status: OK")
                  print("html_chars:", len(html))

                  print("\n--- script src candidates ---")
                  scripts = re.findall(r'<script[^>]+src=["\']([^"\']+)["\']', html, flags=re.I)
                  scripts = [urllib.parse.urljoin(base, s) for s in scripts]
                  for s in unique(scripts)[:80]:
                      print(s)

                  print("\n--- href candidates containing clues ---")
                  hrefs = re.findall(r'href=["\']([^"\']+)["\']', html, flags=re.I)
                  hrefs = [urllib.parse.urljoin(base, h) for h in hrefs]
                  clue_hrefs = [
                      h for h in unique(hrefs)
                      if any(word.lower() in h.lower() for word in CLUE_WORDS)
                  ]
                  for h in clue_hrefs[:80]:
                      print(h)

                  print("\n--- url-like strings containing clues ---")
                  url_strings = re.findall(r'["\']([^"\']*(?:api|ajax|json|dividend|interest|distribution|fundid|FundId|ECN|1084|195)[^"\']*)["\']', html, flags=re.I)
                  for u in unique(url_strings)[:120]:
                      print(urllib.parse.urljoin(base, u))

                  print("\n--- text snippets around clue words ---")
                  compact = re.sub(r"\s+", " ", html)
                  for word in CLUE_WORDS:
                      idx = compact.lower().find(word.lower())
                      if idx >= 0:
                          print(f"\n[{word}]")
                          print(compact[max(0, idx-500):idx+1200])

                  print("\n--- try selected JS files for API clues ---")
                  for js_url in unique(scripts)[:20]:
                      if not js_url.lower().endswith(".js"):
                          continue
                      try:
                          js = fetch(js_url)
                          if any(word.lower() in js.lower() for word in CLUE_WORDS):
                              print("\nJS:", js_url)
                              compact_js = re.sub(r"\s+", " ", js)
                              for word in CLUE_WORDS:
                                  idx = compact_js.lower().find(word.lower())
                                  if idx >= 0:
                                      print(f"[{word}]")
                                      print(compact_js[max(0, idx-400):idx+1000])
                                      break
                      except Exception as e:
                          print("JS fetch error:", js_url, type(e).__name__, str(e))

              except Exception as e:
                  print("status: ERROR")
                  print(type(e).__name__, str(e))
          PY
