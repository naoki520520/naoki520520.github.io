name: Test ETF Dividend Sources

on:
  workflow_dispatch:

jobs:
  test-dividend-sources:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch official dividend pages
        run: |
          python - <<'PY'
          import re
          import urllib.request

          SOURCES = {
              "0056_Yuanta": "https://www.yuantafunds.com/myfund/dividend/history?fundid=1084",
              "00878_Cathay": "https://www.cathaysite.com.tw/ETF/detail/ECN?tab=etf5",
              "00919_Capital": "https://www.capitalfund.com.tw/etf/product/detail/195/interest",
          }

          SEARCH_TERMS = [
              "除息日",
              "發放日",
              "收益分配",
              "配息",
              "每單位",
              "分配金額",
              "現金股利",
              "配息金額",
              "評價日",
              "收益分配基準日",
          ]

          headers = {
              "User-Agent": "Mozilla/5.0",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Accept-Language": "zh-TW,zh;q=0.9,en;q=0.8",
          }

          def strip_tags(s):
              s = re.sub(r"<script[\s\S]*?</script>", " ", s, flags=re.I)
              s = re.sub(r"<style[\s\S]*?</style>", " ", s, flags=re.I)
              s = re.sub(r"<[^>]+>", " ", s)
              s = re.sub(r"&nbsp;|&#160;", " ", s)
              s = re.sub(r"&amp;", "&", s)
              s = re.sub(r"\s+", " ", s)
              return s.strip()

          for name, url in SOURCES.items():
              print("=" * 100)
              print(name)
              print(url)

              try:
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req, timeout=25) as res:
                      raw = res.read()

                  html = raw.decode("utf-8", errors="ignore")
                  text = strip_tags(html)

                  print("status: OK")
                  print("bytes:", len(raw))
                  print("text_chars:", len(text))

                  found = [term for term in SEARCH_TERMS if term in text]
                  print("terms_found:", found)

                  for term in SEARCH_TERMS:
                      idx = text.find(term)
                      if idx >= 0:
                          print(f"\n--- text snippet around [{term}] ---")
                          start = max(0, idx - 600)
                          end = min(len(text), idx + 1600)
                          print(text[start:end])

                  print("\n--- date-like samples ---")
                  samples = re.findall(r"(?:20)?\d{2}[/-]\d{1,2}[/-]\d{1,2}", text)
                  print(samples[:30])

                  print("\n--- number-like samples near dividend words ---")
                  for term in ["配息", "分配金額", "每單位", "收益分配"]:
                      idx = text.find(term)
                      if idx >= 0:
                          window = text[max(0, idx - 300):min(len(text), idx + 1200)]
                          nums = re.findall(r"\d+\.\d+|\d+", window)
                          print(term, nums[:40])

              except Exception as e:
                  print("status: ERROR")
                  print(type(e).__name__, str(e))
          PY
