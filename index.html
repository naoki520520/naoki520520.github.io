<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>//雍雍//股倉儀表板//</title>
<style>
  :root {
    --bg-deep: #050016;
    --glass-bg: rgba(255, 255, 255, 0.08);
    --glass-border: rgba(255, 255, 255, 0.15);
--text-primary: #f8f9f4;
--text-muted: #b9c1b8;
    --accent-pink: #ff4fd8;
    --accent-purple: #9945ff;
    --accent-cyan: #00e5ff;
    --accent-gold: #ffd26f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
  font-family: -apple-system, "PingFang TC", "Noto Sans TC", sans-serif;
  color: var(--text-primary);
  background:
    linear-gradient(
      180deg,
      #020305 0%,
      #05080a 18%,
      #07110f 38%,
      #10231f 58%,
      #dfe5df 100%
    );
  padding: 20px 16px 120px;
  min-height: 100vh;
  background-attachment: fixed;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 70% 18%, rgba(30, 255, 195, 0.16), transparent 28%),
    radial-gradient(circle at 18% 35%, rgba(0, 120, 255, 0.12), transparent 34%),
    radial-gradient(circle at 78% 72%, rgba(255, 255, 255, 0.55), transparent 34%),
    linear-gradient(
      180deg,
      rgba(0,0,0,0.92) 0%,
      rgba(2,10,9,0.82) 36%,
      rgba(15,38,33,0.62) 62%,
      rgba(235,240,235,0.92) 100%
    );
  pointer-events: none;
  z-index: -2;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.028) 1px, transparent 1px);
  background-size: 44px 44px;
  mask-image: linear-gradient(
    180deg,
    black 0%,
    black 52%,
    rgba(0,0,0,0.35) 78%,
    transparent 100%
  );
  -webkit-mask-image: linear-gradient(
    180deg,
    black 0%,
    black 52%,
    rgba(0,0,0,0.35) 78%,
    transparent 100%
  );
  pointer-events: none;
  z-index: -1;
}

  .wrap { max-width: 500px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 24px; }
header h1 {
  font-size: 30px;
  font-weight: 950;
  letter-spacing: 1px;
  background: linear-gradient(
    90deg,
    #f4fff9,
    #7dffd2,
    #1e8f72,
    #0f3d34,
    #b8ffe8,
    #f4fff9
  );
  background-size: 320% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  animation: titleMossBreath 4.6s ease-in-out infinite;
  filter:
    drop-shadow(0 0 10px rgba(50, 255, 190, 0.55))
    drop-shadow(0 0 22px rgba(18, 90, 72, 0.45));
}

@keyframes titleMossBreath {
  0%, 100% {
    background-position: 0% 50%;
    filter:
      drop-shadow(0 0 6px rgba(70, 255, 190, 0.35))
      drop-shadow(0 0 14px rgba(12, 65, 52, 0.35));
    opacity: 0.86;
    transform: scale(0.995);
  }

  45%, 55% {
    background-position: 100% 50%;
    filter:
      drop-shadow(0 0 14px rgba(120, 255, 215, 0.85))
      drop-shadow(0 0 34px rgba(20, 120, 92, 0.78))
      drop-shadow(0 0 52px rgba(220, 255, 235, 0.30));
    opacity: 1;
    transform: scale(1.018);
  }
}
  header .sub { font-size: 11px; color: var(--text-muted); letter-spacing: 1.5px; }
.brand-chip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 10px;
  padding: 7px 14px;
  border-radius: 999px;
  font-size: 9px;
  font-weight: 900;
  letter-spacing: 1.8px;
  color: #b8ffe8;
  background: rgba(5, 18, 16, 0.55);
  border: 1px solid rgba(184,255,232,0.24);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.18),
    0 0 22px rgba(90,255,210,0.12);
  text-shadow: 0 0 12px rgba(120,255,215,0.55);
}

  
  /* Dashboard */
.dashboard {
  position: relative;
  overflow: hidden;
  isolation: isolate;
  background: var(--glass-bg);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  border: 1px solid var(--glass-border);
  border-radius: 28px;
  padding: 24px 22px;
  margin-bottom: 24px;
  box-shadow: 0 12px 50px rgba(0,0,0,0.5);
}
  .dashboard > * {
  position: relative;
  z-index: 2;
}
.dashboard::before {
  content: "";
  position: absolute;
  inset: -45%;
  border-radius: inherit;
  background:
    radial-gradient(circle at 25% 25%, rgba(255,79,216,0.60), transparent 28%),
    radial-gradient(circle at 75% 30%, rgba(0,229,255,0.48), transparent 30%),
    radial-gradient(circle at 55% 78%, rgba(255,210,111,0.42), transparent 32%),
    radial-gradient(circle at 18% 80%, rgba(153,69,255,0.48), transparent 34%);
  filter: blur(26px) saturate(1.35);
  opacity: 0.55;
  z-index: 0;
  pointer-events: none;
  animation: dashboardAuroraFlow 8s ease-in-out infinite alternate;
}

  @keyframes dashboardAuroraFlow {
  0% {
    transform: translate3d(-5%, -4%, 0) rotate(0deg) scale(1);
    opacity: 0.50;
    filter: blur(24px) saturate(1.15);
  }

  35% {
    transform: translate3d(6%, -2%, 0) rotate(18deg) scale(1.08);
    opacity: 0.82;
    filter: blur(30px) saturate(1.45);
  }

  70% {
    transform: translate3d(3%, 7%, 0) rotate(34deg) scale(1.12);
    opacity: 0.68;
    filter: blur(28px) saturate(1.30);
  }

  100% {
    transform: translate3d(-4%, 5%, 0) rotate(52deg) scale(1.05);
    opacity: 0.88;
    filter: blur(34px) saturate(1.55);
  }
}

  .dashboard::after {
  content: "";
  position: absolute;
  inset: -35%;
  background: conic-gradient(
    from 0deg,
    rgba(255,79,216,0.22),
    rgba(0,229,255,0.18),
    rgba(255,210,111,0.18),
    rgba(153,69,255,0.22),
    rgba(255,79,216,0.22)
  );
  filter: blur(28px);
  opacity: 0.55;
  animation: haloSpin 9s linear infinite;
  z-index: -2;
  pointer-events: none;
}

@keyframes haloSpin {
  to { transform: rotate(360deg); }
}
  .dash-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  
  /* 總市值：螢光效果 */
  .dash-total { 
    animation: moneyPulse 2.8s ease-in-out infinite;
    @keyframes moneyPulse {
  0%, 100% {
    transform: scale(1);
    text-shadow:
      0 0 10px rgba(255,255,255,0.7),
      0 0 22px rgba(255,210,111,0.35);
  }
  50% {
    transform: scale(1.025);
    text-shadow:
      0 0 18px rgba(255,255,255,0.95),
      0 0 34px rgba(255,210,111,0.85),
      0 0 58px rgba(255,79,216,0.45);
  }
}
    font-size: 36px; 
    font-weight: 900; 
    color: #fff; 
    margin-bottom: 14px;
    text-shadow: 0 0 10px rgba(255,255,255,0.7), 0 0 20px rgba(255, 255, 255, 0.3), 0 0 35px rgba(255, 210, 111, 0.2);
  }
  
  .btn-refresh {
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 50%; width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; cursor: pointer;
  }
  .btn-refresh.loading svg { animation: spin 1s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .dash-info { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .dash-item .l { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
  .dash-item .v { font-size: 15px; font-weight: 800; color: var(--accent-cyan); }

  .dash-year { padding-top: 16px; display: flex; justify-content: space-between; align-items: center; }
  .year-l { font-size: 12px; color: var(--text-muted); font-weight: 600; }
  
  /* 預估年股息：金黃發光效果 */
  .year-v { 
    font-size: 26px; 
    font-weight: 900; 
    color: var(--accent-gold); 
    text-shadow: 0 0 12px rgba(255, 210, 111, 0.9), 0 0 25px rgba(255, 210, 111, 0.5);
  }

  /* Cards */
  .card {
    background: var(--glass-bg);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 20px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
/* Obsidian Ring Card：黑曜石紋理 + 底層彩虹光 */
.card {
  position: relative;
  overflow: hidden;
  isolation: isolate;
  border-radius: 28px;
  padding: 20px;
  margin-bottom: 20px;

  background:
    radial-gradient(circle at 18% 88%, rgba(0,229,255,0.48), transparent 28%),
    radial-gradient(circle at 52% 92%, rgba(255,210,111,0.38), transparent 34%),
    radial-gradient(circle at 88% 86%, rgba(255,79,216,0.46), transparent 32%),
    radial-gradient(circle at 28% 8%, rgba(255,255,255,0.16), transparent 24%),
    linear-gradient(
      145deg,
      rgba(255,255,255,0.10),
      rgba(255,255,255,0.035) 38%,
      rgba(0,0,0,0.38)
    ),
    rgba(10, 8, 22, 0.88);

    background-size: 135% 135%, 145% 145%, 140% 140%, 100% 100%, 100% 100%, 100% 100%;
  background-position: 0% 92%, 50% 100%, 100% 88%, 28% 8%, center, center;
  animation: cardAuroraBreath 3.2s ease-in-out infinite alternate;

  border: 1px solid rgba(255,255,255,0.18);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);

  box-shadow:
    0 22px 70px rgba(0,0,0,0.68),
    inset 0 1px 0 rgba(255,255,255,0.22),
    inset 0 -18px 45px rgba(0,0,0,0.42),
    0 0 42px rgba(var(--glow-rgb), 0.20);
}

  @keyframes cardAuroraBreath {
  0% {
    background-position:
      -8% 96%,
      48% 104%,
      110% 92%,
      28% 8%,
      center,
      center;
    filter: brightness(0.92) saturate(1.05);
    box-shadow:
      0 18px 56px rgba(0,0,0,0.68),
      inset 0 1px 0 rgba(255,255,255,0.16),
      inset 0 -18px 45px rgba(0,0,0,0.45),
      0 0 18px rgba(var(--glow-rgb), 0.10);
  }

  50% {
    background-position:
      10% 82%,
      55% 88%,
      88% 80%,
      28% 8%,
      center,
      center;
    filter: brightness(1.22) saturate(1.95);
    box-shadow:
      0 26px 78px rgba(0,0,0,0.72),
      inset 0 1px 0 rgba(255,255,255,0.28),
      inset 0 -18px 52px rgba(0,0,0,0.34),
      0 0 42px rgba(var(--glow-rgb), 0.34),
      0 0 88px rgba(var(--glow-rgb), 0.14);
  }

  100% {
    background-position:
      2% 86%,
      62% 98%,
      96% 84%,
      28% 8%,
      center,
      center;
    filter: brightness(1.02) saturate(1.35);
    box-shadow:
      0 22px 70px rgba(0,0,0,0.68),
      inset 0 1px 0 rgba(255,255,255,0.22),
      inset 0 -18px 45px rgba(0,0,0,0.42),
      0 0 34px rgba(var(--glow-rgb), 0.24);
  }
}

/* 卡片底部彩虹發光層 */
.card::before {
  display: none !important;
}

/* 黑色磨砂顆粒紋理 + 上方暗面 */
.card::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background:
    radial-gradient(circle at 30% 0%, rgba(255,255,255,0.16), transparent 24%),
    linear-gradient(180deg, rgba(255,255,255,0.09), transparent 32%, rgba(0,0,0,0.34) 100%),
    repeating-radial-gradient(
      circle at 20% 30%,
      rgba(255,255,255,0.055) 0 1px,
      transparent 1px 4px
    );
  mix-blend-mode: screen;
  opacity: 0.61;
  z-index: 1;
  pointer-events: none;
}

/* 確保卡片內容在紋理與彩虹光上層 */
.card > * {
  position: relative;
  z-index: 2;
}

@keyframes cardInnerAurora {
  0% {
    opacity: 0.46;
    transform: translate3d(-2%, 2%, 0) scale(1.02);
    filter: saturate(1.2) brightness(0.9);
  }

  50% {
    opacity: 0.92;
    transform: translate3d(2%, -1%, 0) scale(1.04);
    filter: saturate(1.75) brightness(1.12);
  }

  100% {
    opacity: 0.70;
    transform: translate3d(-1%, -2%, 0) scale(1.03);
    filter: saturate(1.55) brightness(1.02);
  }
}

  45% {
    transform: translate3d(4%, 12%, 0) scale(1.08);
    filter: blur(20px) saturate(1.9);
    opacity: 0.95;
  }

  100% {
    transform: translate3d(-2%, 15%, 0) scale(1.12);
    filter: blur(22px) saturate(2.1);
    opacity: 0.78;
  }
}
  
  .c-0056 { --accent: var(--accent-pink); --glow-rgb: 255, 79, 216; }
  .c-00878 { --accent: var(--accent-cyan); --glow-rgb: 0, 229, 255; }
  .c-00919 { --accent: var(--accent-purple); --glow-rgb: 153, 69, 255; }

  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .card-title { font-size: 22px; font-weight: 900; }
  .price-tag { background: rgba(255,255,255,0.1); padding: 6px 14px; border-radius: 12px; font-size: 13px; cursor: pointer; }
  .price-tag b { color: var(--accent-gold); }

.input-row {
  background: rgba(0,0,0,0.35);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  margin-bottom: 18px;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow:
    inset 0 0 18px rgba(255,255,255,0.04),
    0 0 18px rgba(var(--glow-rgb), 0.12);
  transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
}
  .input-row label { font-size: 12px; color: var(--text-muted); flex: 1; font-weight: 600; }
  .input-row input {
    background: transparent; border: none; color: #fff; text-align: right;
    font-size: 22px; font-weight: 800; width: 130px; outline: none; font-family: inherit;
  }
  .input-row:focus-within {
  border-color: var(--accent);
  box-shadow:
    inset 0 0 20px rgba(255,255,255,0.05),
    0 0 26px rgba(var(--glow-rgb), 0.45);
  transform: translateY(-1px);
}

  .history { background: rgba(255,255,255,0.03); border-radius: 14px; padding: 12px; margin-bottom: 18px; }
  .hist-title { font-size: 10px; color: var(--text-muted); margin-bottom: 10px; text-align: center; }
  .hist-flex { display: flex; gap: 6px; }
  .hist-item {
  flex: 1;
  text-align: center;
  background: rgba(0,0,0,0.25);
  padding: 8px 2px;
  border-radius: 10px;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: inset 0 0 16px rgba(var(--glow-rgb),0.12);
}

.hist-item::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 0%, rgba(var(--glow-rgb),0.35), transparent 58%),
    linear-gradient(180deg, rgba(255,255,255,0.08), transparent);
  pointer-events: none;
}
  .hist-item .q { display: block; font-size: 8px; color: var(--text-muted); margin-bottom: 3px; }
  .hist-item .v { font-size: 12px; font-weight: 800; color: var(--accent-cyan); }

  /* 調整後的卡片數據網格：2x2 */
  .card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .stat-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 14px; }
  .stat-item .l { font-size: 9px; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; }
  
  /* 市值螢光 */
  .mkt-val { 
    font-size: 14px; font-weight: 800; color: #fff; 
    text-shadow: 0 0 10px rgba(var(--glow-rgb), 0.8), 0 0 20px rgba(var(--glow-rgb), 0.3);
  }

  .card-estimate {
    background: linear-gradient(135deg, rgba(var(--glow-rgb), 0.15), transparent);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; padding: 18px; text-align: center;
  }
  .est-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  
  /* 預估可領螢光 */
  .cur-div-val { 
    font-size: 28px; font-weight: 900; color: #fff;
    text-shadow: 0 0 10px rgba(255,255,255,0.4), 0 0 20px rgba(var(--glow-rgb), 1);
  }
  .est-year { font-size: 11px; color: var(--text-muted); margin-top: 8px; }

  .btn-ics {
    width: 100%; margin-top: 14px; padding: 16px; border-radius: 16px; border: none;
    background: var(--accent); color: #fff; font-weight: 800; font-size: 15px;
    box-shadow: 0 6px 25px rgba(var(--glow-rgb), 0.35);
  }

  footer { text-align: center; font-size: 10px; color: var(--text-muted); margin-top: 35px; line-height: 1.8; }
/* Touch Ripple：手機觸控能量波紋 */
.card,
.btn-refresh,
.price-tag,
.input-row,
.hist-item,
.card-estimate {
  position: relative;
  overflow: hidden;
}

.touch-ripple {
  position: absolute;
  border-radius: 999px;
  transform: scale(0);
  background:
    radial-gradient(circle, rgba(255,255,255,0.75), rgba(255,255,255,0.22) 35%, transparent 68%);
  box-shadow:
    0 0 18px rgba(255,255,255,0.7),
    0 0 36px rgba(var(--glow-rgb, 0, 229, 255), 0.55);
  pointer-events: none;
  animation: rippleBurst 0.72s ease-out forwards;
  mix-blend-mode: screen;
  z-index: 3;
}

@keyframes rippleBurst {
  0% {
    opacity: 0.95;
    transform: scale(0);
  }
  70% {
    opacity: 0.08;
  }
  100% {
    opacity: 0;
    transform: scale(3.4);
  }
}

/* Refresh Energy Flash：刷新時全畫面能量閃光 */
#energyFlash {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 999;
  opacity: 0;
  background:
    radial-gradient(circle at 50% 35%, rgba(255,255,255,0.95), transparent 10%),
    radial-gradient(circle at 50% 45%, rgba(0,229,255,0.55), transparent 28%),
    radial-gradient(circle at 50% 55%, rgba(255,79,216,0.38), transparent 48%),
    linear-gradient(135deg, rgba(255,210,111,0.22), rgba(153,69,255,0.18));
  mix-blend-mode: screen;
}

#energyFlash.active {
  animation: energyFlashBurst 0.9s ease-out forwards;
}

@keyframes energyFlashBurst {
  0% {
    opacity: 0;
    transform: scale(0.94);
    filter: blur(18px);
  }
  18% {
    opacity: 1;
    transform: scale(1.02);
    filter: blur(4px);
  }
  42% {
    opacity: 0.55;
    transform: scale(1.08);
    filter: blur(10px);
  }
  100% {
    opacity: 0;
    transform: scale(1.18);
    filter: blur(24px);
  }
}

/* 手機效能保險 */
@media (prefers-reduced-motion: reduce) {
  .touch-ripple,
  #energyFlash.active {
    animation: none !important;
    display: none !important;
  }
}

/* HUD 掃描線：金融科技感背景動態 */
.wrap::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    linear-gradient(
      to bottom,
      transparent 0%,
      rgba(0,229,255,0.08) 50%,
      transparent 100%
    );
  height: 22%;
  animation: hudScan 5.5s linear infinite;
  mix-blend-mode: screen;
}

@keyframes hudScan {
  0% { transform: translateY(-130%); opacity: 0; }
  12% { opacity: 0.75; }
  55% { opacity: 0.35; }
  100% { transform: translateY(520%); opacity: 0; }
}

/* 配息回測晶片：依序能量脈衝 */
.hist-item {
  animation: chipPulse 4.8s ease-in-out infinite;
}

.hist-item:nth-child(1) { animation-delay: 0s; }
.hist-item:nth-child(2) { animation-delay: 0.25s; }
.hist-item:nth-child(3) { animation-delay: 0.5s; }
.hist-item:nth-child(4) { animation-delay: 0.75s; }

@keyframes chipPulse {
  0%, 100% {
    box-shadow:
      inset 0 0 16px rgba(var(--glow-rgb),0.12),
      0 0 0 rgba(var(--glow-rgb),0);
    transform: translateY(0);
  }
  45% {
    box-shadow:
      inset 0 0 20px rgba(var(--glow-rgb),0.22),
      0 0 18px rgba(var(--glow-rgb),0.22);
    transform: translateY(-1px);
  }
}

 @supports (animation-timeline: view()) {
  .card,
.cost-panel {
    animation: cardScrollReveal both ease-out;
    animation-timeline: view();
    animation-range: entry 5% cover 35%;
  }

  @keyframes cardScrollReveal {
    from {

let holdings = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
let avgCosts = JSON.parse(localStorage.getItem(AVG_COST_KEY) || "{}");
  
function fmt(n) { return Math.round(n).toLocaleString(); }

function fmtPnl(n) {
  const sign = n > 0 ? "+" : n < 0 ? "-" : "";
  return `${sign}NT$ ${fmt(Math.abs(n))}`;
}

function fmtRate(n) {
  const sign = n > 0 ? "+" : n < 0 ? "" : "";
  return `${sign}${n.toFixed(2)}%`;
}

function pnlClass(n) {
  if (n > 0) return "pnl-positive";
  if (n < 0) return "pnl-negative";
  return "pnl-neutral";
}

function getYearlySum(etf) { return etf.history.reduce((a, b) => a + b.v, 0); }
  
function updateCalculations() {
  let totalV = 0, totalS = 0, totalD = 0, totalYD = 0;
  ETFS.forEach(etf => {
    const s = holdings[etf.id] || 0;
    const stocks = s * 1000;
    const mktV = stocks * etf.price;
    const curD = stocks * etf.div;
    const yearD = stocks * getYearlySum(etf);
    totalV += mktV; totalS += s; totalD += curD; totalYD += yearD;
    const card = document.querySelector(`.c-${etf.id}`);
    if (card) {
      card.querySelector('.price-val').textContent = etf.price.toFixed(2);
      card.querySelector('.mkt-val').textContent = `NT$ ${fmt(mktV)}`;
      card.querySelector('.cur-div-val').textContent = `NT$ ${fmt(curD)}`;
      card.querySelector('.year-div-val').textContent = `年估收入 NT$ ${fmt(yearD)}`;
    }
  });
  document.getElementById("totalValue").textContent = `NT$ ${fmt(totalV)}`;
  document.getElementById("totalShares").textContent = totalS.toLocaleString();
  document.getElementById("totalDividend").textContent = `NT$ ${fmt(totalD)}`;
  document.getElementById("totalYearDividend").textContent = `NT$ ${fmt(totalYD)}`;
updateCostPanel();
}

function renderCostPanel() {
  const panel = document.getElementById("costPanelRows");
  if (!panel) return;

  panel.innerHTML = ETFS.map(etf => {
    const avg = avgCosts[etf.id] || "";
    return `
      <div class="cost-row c-${etf.id}">
        <div class="cost-row-head">
          <div class="cost-name">
            ${etf.id}
            <span>${etf.name}</span>
          </div>
          <div class="cost-price">
            目前市價
            <b>$<span class="cost-current-price" data-id="${etf.id}">${etf.price.toFixed(2)}</span></b>
          </div>
        </div>

        <div class="cost-input-line">
          <div class="cost-input-box">
            <label>成本均價</label>
            <input
              type="number"
              step="0.01"
              inputmode="decimal"
              value="${avg}"
              placeholder="0"
              oninput="updateAvgCost('${etf.id}', this.value)"
            >
          </div>

          <div class="cost-input-box">
            <label>持有張數</label>
            <input
              type="number"
              step="0.01"
              inputmode="decimal"
              value="${holdings[etf.id] || ""}"
              placeholder="0"
              oninput="updateHold('${etf.id}', this.value)"
            >
          </div>
        </div>

        <div class="cost-result-line">
          <div class="cost-result">
            <div class="l">預估損益金額</div>
            <div class="v pnl-amount pnl-neutral" data-id="${etf.id}">未輸入</div>
          </div>

          <div class="cost-result">
            <div class="l">報酬率</div>
            <div class="v pnl-rate pnl-neutral" data-id="${etf.id}">未輸入</div>
          </div>
        </div>
      </div>
    `;
  }).join("");

  updateCostPanel();
}

function initialRender() {
  const container = document.getElementById("cards");
  container.innerHTML = "";
  ETFS.forEach(etf => {
    const s = holdings[etf.id] || 0;
    const yearlySum = getYearlySum(etf);
    const div = document.createElement("div");
    div.className = `card c-${etf.id}`;
    div.innerHTML = `
      <div class="card-header">
        <div class="card-title">${etf.id} <span style="font-size:12px; color:var(--text-muted); font-weight:400">${etf.name}</span></div>
        <div class="price-tag" onclick="manual('${etf.id}')">市價 <b>$<span class="price-val">${etf.price.toFixed(2)}</span></b></div>
      </div>
      <div class="input-row">
        <label>持有張數</label>
        <input type="number" step="0.01" inputmode="decimal" value="${s || ""}" placeholder="0" oninput="updateHold('${etf.id}', this.value)">
        <span style="font-size:12px; margin-left:8px">張</span>
      </div>
      <div class="history">
        <div class="hist-title">最近四次配息回測 (合計 $${yearlySum.toFixed(3)})</div>
        <div class="hist-flex">${etf.history.map(h => `<div class="hist-item"><span class="q">${h.q}</span><span class="v">$${h.v.toFixed(2)}</span></div>`).join('')}</div>
      </div>
      <div class="card-stats">
  <div class="stat-item" style="grid-column: span 2;"><div class="l">💎 持股市值</div><div class="v mkt-val">NT$ 0</div></div>
</div>
      <div class="card-estimate">
        <div class="est-label">本次預估可領</div>
        <div class="est-val cur-div-val">NT$ 0</div>
        <div class="est-year year-div-val">年估收入 NT$ 0</div>
      </div>
    
    `;
    container.appendChild(div);
  });
  updateCalculations();
}

window.updateHold = (id, val) => {
  holdings[id] = parseFloat(val) || 0;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(holdings));
  updateCalculations();
  updateCostPanel();
};

window.updateAvgCost = (id, val) => {
  avgCosts[id] = parseFloat(val) || 0;
  localStorage.setItem(AVG_COST_KEY, JSON.stringify(avgCosts));
  updateCostPanel();
};

function updateCostPanel() {
  ETFS.forEach(etf => {
    const shares = holdings[etf.id] || 0;
    const avg = avgCosts[etf.id] || 0;
    const stocks = shares * 1000;

    const marketValue = stocks * etf.price;
    const cost = stocks * avg;
    const pnl = avg > 0 && stocks > 0 ? marketValue - cost : 0;
    const rate = cost > 0 ? (pnl / cost) * 100 : 0;

    const priceEl = document.querySelector(`.cost-current-price[data-id="${etf.id}"]`);
    const pnlEl = document.querySelector(`.pnl-amount[data-id="${etf.id}"]`);
    const rateEl = document.querySelector(`.pnl-rate[data-id="${etf.id}"]`);

    if (priceEl) priceEl.textContent = etf.price.toFixed(2);

    if (pnlEl) {
      pnlEl.textContent = avg > 0 && stocks > 0 ? fmtPnl(pnl) : "未輸入";
      pnlEl.className = `v pnl-amount ${avg > 0 && stocks > 0 ? pnlClass(pnl) : "pnl-neutral"}`;
    }

    if (rateEl) {
      rateEl.textContent = avg > 0 && stocks > 0 ? fmtRate(rate) : "未輸入";
      rateEl.className = `v pnl-rate ${avg > 0 && stocks > 0 ? pnlClass(pnl) : "pnl-neutral"}`;
    }
  });
}

async function fetchDividends() {
  try {
    const res = await fetch(`dividends.json?t=${Date.now()}`, {
      cache: "no-store"
    });

    if (!res.ok) {
      throw new Error(`dividends.json 讀取失敗：${res.status}`);
    }

    const data = await res.json();

    ETFS.forEach(etf => {
      const item = data.symbols && data.symbols[etf.id];
      if (!item) return;

      if (item.currentDividend) {
        etf.div = parseFloat(item.currentDividend);
      }

      if (Array.isArray(item.history) && item.history.length) {
        etf.history = item.history.slice(0, 4).map(x => ({
          q: x.q,
          v: parseFloat(x.v),
          exDate: x.exDate,
          payDate: x.payDate
        }));

        const latest = etf.history[0];
        if (latest.exDate) etf.ex = latest.exDate.slice(5);
        if (latest.payDate) etf.pay = latest.payDate.slice(5);
      }
    });

    return true;
  } catch (e) {
    console.error(e);
    toast("⚠️ 配息資料更新失敗，暫用預設資料");
    return false;
  }
}
  
async function handleRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  const status = await fetchPrices();
  if (status) {
    toast("✅ 即時市價已同步更新");
    document.getElementById('lastUpdate').textContent = `最後更新：${new Date().toLocaleTimeString()}`;
    updateCalculations();
    updateCostPanel();
  }
  btn.classList.remove('loading');
}

async function fetchPrices() {
  try {
    const res = await fetch(`prices.json?t=${Date.now()}`, {
      cache: "no-store"
    });

    if (!res.ok) {
      throw new Error(`prices.json 讀取失敗：${res.status}`);
    }

    const data = await res.json();

    ETFS.forEach(etf => {
      const item = data.symbols && data.symbols[etf.id];
      if (item && item.price) {
        etf.price = parseFloat(item.price);
      }
    });

    if (data.updatedAt) {
      document.getElementById('lastUpdate').textContent = `最後更新：${new Date(data.updatedAt).toLocaleString()}`;
    }

    return true;
  } catch (e) {
    console.error(e);
    toast("⚠️ 價格更新失敗，暫用畫面原價格");
    return false;
  }
}

function toast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

function triggerEnergyFlash() {
  const flash = document.getElementById("energyFlash");
  if (!flash) return;

  flash.classList.remove("active");
  void flash.offsetWidth;
  flash.classList.add("active");
}

function createTouchRipple(e) {
  const target = e.target.closest(".card, .btn-refresh, .price-tag, .input-row, .hist-item, .card-estimate");
  if (!target) return;

  const rect = target.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height) * 0.9;
  const ripple = document.createElement("span");

  ripple.className = "touch-ripple";
  ripple.style.width = `${size}px`;
  ripple.style.height = `${size}px`;
  ripple.style.left = `${e.clientX - rect.left - size / 2}px`;
  ripple.style.top = `${e.clientY - rect.top - size / 2}px`;

  target.appendChild(ripple);

  setTimeout(() => {
    ripple.remove();
  }, 750);
}

document.addEventListener("pointerdown", createTouchRipple, { passive: true });

window.manual = (id) => {
  const etf = ETFS.find(x=>x.id===id);
  const p = prompt(`修正 ${id} 的最新市價：`, etf.price);
  if(p && !isNaN(p)) { etf.price = parseFloat(p); updateCalculations(); }
};



document.getElementById('refreshBtn').onclick = handleRefresh;

async function boot() {
  await fetchDividends();
  initialRender();
  renderCostPanel();
  setTimeout(handleRefresh, 1000);
}

boot();
  
</script>
</body>
</html>
