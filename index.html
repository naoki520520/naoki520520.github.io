<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ 宇宙股息追蹤器 · Live Edition</title>
<style>
  :root {
    --bg-deep: #050016;
    --glass-bg: rgba(255, 255, 255, 0.06);
    --glass-border: rgba(255, 255, 255, 0.18);
    --text-primary: #f5f3ff;
    --text-muted: #a8a4c7;
    --accent-pink: #ff4fd8;
    --accent-purple: #9945ff;
    --accent-cyan: #00e5ff;
    --accent-gold: #ffd26f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    color: var(--text-primary);
    background: var(--bg-deep);
    overflow-x: hidden;
    position: relative;
    padding: 24px 16px 60px;
    min-height: 100vh;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(153, 69, 255, 0.45), transparent 55%),
      radial-gradient(ellipse at 85% 20%, rgba(255, 79, 216, 0.4), transparent 55%),
      radial-gradient(ellipse at 70% 85%, rgba(0, 229, 255, 0.35), transparent 55%),
      linear-gradient(180deg, #050016 0%, #0b0030 50%, #050016 100%);
    z-index: -2;
  }

  .wrap { max-width: 820px; margin: 0 auto; }

  header { text-align: center; padding: 16px 8px 28px; position: relative; }
  header h1 {
    font-size: 26px;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 0 20px rgba(255, 79, 216, 0.6);
    margin-bottom: 6px;
  }
  header .sub { font-size: 13px; color: var(--text-muted); }

  /* Dashboard */
  .dashboard {
    backdrop-filter: blur(24px) saturate(160%);
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 20px 18px;
    margin-bottom: 24px;
    box-shadow: 0 8px 40px rgba(153, 69, 255, 0.18);
    position: relative;
  }
  .dash-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .dash-title { font-size: 12px; color: var(--text-muted); letter-spacing: 2px; }
  
  .btn-refresh {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid var(--glass-border);
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    color: var(--text-primary);
  }
  .btn-refresh:hover { background: rgba(255, 255, 255, 0.2); transform: rotate(180deg); }
  .btn-refresh.loading { animation: spin 1s linear infinite; pointer-events: none; opacity: 0.6; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .dash-total {
    font-size: 34px;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 0 18px rgba(255, 210, 111, 0.7);
    margin: 8px 0;
  }
  .dash-sub { display: flex; gap: 16px; font-size: 13px; color: var(--text-muted); }
  .dash-sub b { color: var(--accent-cyan); }

  .dash-year {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .year-value { font-size: 24px; font-weight: 800; color: #fff; text-shadow: 0 0 18px rgba(0, 229, 255, 0.7); }
  .update-time { font-size: 10px; color: var(--text-muted); margin-top: 8px; text-align: right; }

  /* Card */
  .card {
    backdrop-filter: blur(22px) saturate(160%);
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 22px;
    padding: 20px 18px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: var(--card-accent, linear-gradient(90deg, #ff4fd8, #9945ff, #00e5ff));
  }
  .card[data-id="0056"] { --card-accent: linear-gradient(90deg, #ff4fd8, #ffd26f); --glow: 255, 79, 216; }
  .card[data-id="00878"] { --card-accent: linear-gradient(90deg, #00e5ff, #9945ff); --glow: 0, 229, 255; }
  .card[data-id="00919"] { --card-accent: linear-gradient(90deg, #9945ff, #ff4fd8); --glow: 153, 69, 255; }

  .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .card-code { font-size: 24px; font-weight: 900; color: #fff; text-shadow: 0 0 14px rgba(var(--glow), 0.8); }
  .price-tag {
    font-size: 13px;
    background: rgba(255,255,255,0.08);
    padding: 5px 12px;
    border-radius: 999px;
    border: 1px solid var(--glass-border);
  }
  .price-tag b { color: var(--accent-gold); font-size: 15px; }

  .holding {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding: 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 14px;
  }
  .holding input {
    flex: 1;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 10px;
    color: #fff;
    text-align: right;
    outline: none;
    font-weight: 600;
  }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .info-box { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 10px; }
  .info-box .label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .info-box .value { font-size: 15px; font-weight: 700; }

  .estimate {
    background: linear-gradient(135deg, rgba(255,79,216,0.1), rgba(0,229,255,0.1));
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 14px;
    text-align: center;
  }
  .estimate .amount { font-size: 26px; font-weight: 800; text-shadow: 0 0 16px var(--accent-pink); }

  .btn-calendar {
    width: 100%;
    background: linear-gradient(135deg, #9945ff, #ff4fd8, #00e5ff);
    background-size: 200%;
    border: none;
    border-radius: 14px;
    padding: 14px;
    color: #fff;
    font-weight: 700;
    margin-top: 14px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(153, 69, 255, 0.3);
  }

  footer { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 30px; line-height: 1.6; }

  /* Error Toast */
  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 50, 50, 0.9);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 100;
    display: none;
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1>✨ 宇宙股息追蹤器</h1>
    <div class="sub">REAL-TIME ETF TRACKER · 2026 EDITION</div>
  </header>

  <div class="dashboard">
    <div class="dash-header">
      <div class="dash-title">💎 投資組合總市值</div>
      <button class="btn-refresh" id="refreshBtn" title="手動刷新市價">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
      </button>
    </div>
    <div class="dash-total" id="totalValue">NT$ 0</div>
    <div class="dash-sub">
      <span>📦 總張數 <b id="totalShares">0</b></span>
      <span>💰 本季預估股息 <b id="totalDividend">NT$ 0</b></span>
    </div>
    <div class="dash-year">
      <span style="font-size:12px; color:var(--text-muted)">🌟 預估年股息</span>
      <span class="year-value" id="totalYearDividend">NT$ 0</span>
    </div>
    <div class="update-time" id="lastUpdate">最後更新：尚未更新</div>
  </div>

  <div id="cards"></div>

  <footer>
    資料來源：Gemini AI 即時搜尋報價<br>
    ⚡ 價格約有 15-20 分鐘延遲 · 資料僅供參考<br>
    持股資料存於本機 · 年股息採近 4 次配息回測
  </footer>
</div>

<div id="toast"></div>

<script>
const apiKey = ""; // 執行環境自動填入
const ETFS = [
  {
    id: "0056",
    name: "元大高股息",
    price: 39.41,
    dividend: 1.00,
    exDate: "2026-04-23",
    payDate: "2026-05-14",
    history: [{v: 1.07}, {v: 1.07}, {v: 0.866}, {v: 0.866}]
  },
  {
    id: "00878",
    name: "國泰永續高股息",
    price: 21.81,
    dividend: 0.42,
    exDate: "2026-05-19",
    payDate: "2026-06-16",
    history: [{v: 0.47}, {v: 0.40}, {v: 0.40}, {v: 0.42}]
  },
  {
    id: "00919",
    name: "群益台灣精選高息",
    price: 22.92,
    dividend: 0.78,
    exDate: "2026-06-16",
    payDate: "2026-07-14",
    history: [{v: 0.72}, {v: 0.54}, {v: 0.54}, {v: 0.78}]
  }
];

const STORAGE_KEY = "cosmic_etf_holdings_live";
let holdings = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");

// --- API Logic ---

async function fetchPricesWithRetry(retries = 5, delay = 1000) {
  const codes = ETFS.map(e => e.id).join(", ");
  const userQuery = `請幫我查詢台灣股市最新成交價：${codes}。請只回傳這三個代號對應的數字報價，格式為 JSON: {"0056": 數字, "00878": 數字, "00919": 數字}`;
  const systemPrompt = "你是一個金融數據助手。利用 Google Search 搜尋最新的台股收盤價或盤中價。請精確回傳數字，不要有任何多餘文字。";

  for (let i = 0; i < retries; i++) {
    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: userQuery }] }],
          systemInstruction: { parts: [{ text: systemPrompt }] },
          tools: [{ "google_search": {} }],
          generationConfig: { responseMimeType: "application/json" }
        })
      });

      if (!response.ok) throw new Error('API Error');

      const result = await response.json();
      const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
      return JSON.parse(text);
    } catch (err) {
      if (i === retries - 1) throw err;
      await new Promise(r => setTimeout(r, delay * Math.pow(2, i)));
    }
  }
}

async function refreshPrices() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  
  try {
    const newPrices = await fetchPricesWithRetry();
    ETFS.forEach(etf => {
      if (newPrices[etf.id]) {
        etf.price = parseFloat(newPrices[etf.id]);
      }
    });
    
    document.getElementById('lastUpdate').textContent = `最後更新：${new Date().toLocaleTimeString()}`;
    renderAll();
  } catch (err) {
    showToast("價格更新失敗，請稍後再試");
  } finally {
    btn.classList.remove('loading');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

// --- Render Logic ---

function fmtMoney(n) { return "NT$ " + Math.round(n).toLocaleString(); }
function getYearlyPerShare(etf) { return etf.history.reduce((sum, h) => sum + h.v, 0); }

function renderAll() {
  const container = document.getElementById("cards");
  container.innerHTML = "";
  
  let totalValue = 0, totalShares = 0, totalDiv = 0, totalYearDiv = 0;

  ETFS.forEach(etf => {
    const s = holdings[etf.id] || 0;
    const stockCount = s * 1000;
    const marketValue = stockCount * etf.price;
    const estDiv = stockCount * etf.dividend;
    const yearPerShare = getYearlyPerShare(etf);
    const yearDiv = stockCount * yearPerShare;

    totalValue += marketValue;
    totalShares += s;
    totalDiv += estDiv;
    totalYearDiv += yearDiv;

    const card = document.createElement("div");
    card.className = "card";
    card.setAttribute("data-id", etf.id);
    card.innerHTML = `
      <div class="card-head">
        <div class="card-code">${etf.id} <span style="font-size:12px; font-weight:400; color:var(--text-muted)">${etf.name}</span></div>
        <div class="price-tag">市價 <b>$${etf.price.toFixed(2)}</b></div>
      </div>
      <div class="holding">
        <label style="font-size:12px; color:var(--text-muted)">持有張數</label>
        <input type="number" step="0.01" value="${s || ""}" placeholder="0" data-id="${etf.id}" class="shares-input">
        <span style="font-size:12px">張</span>
      </div>
      <div class="info-grid">
        <div class="info-box">
          <div class="label">💎 持股市值</div>
          <div class="value">${fmtMoney(marketValue)}</div>
        </div>
        <div class="info-box">
          <div class="label">📅 除息日</div>
          <div class="value">${etf.exDate.slice(5)}</div>
        </div>
      </div>
      <div class="estimate">
        <div style="font-size:11px; color:var(--text-muted); margin-bottom:4px">本季預估股息</div>
        <div class="amount">${fmtMoney(estDiv)}</div>
        <div style="font-size:10px; color:var(--text-muted); margin-top:6px">年估收入 ${fmtMoney(yearDiv)}</div>
      </div>
      <button class="btn-calendar" onclick="downloadICS('${etf.id}')">📆 加入配息行事曆</button>
    `;
    container.appendChild(card);
  });

  // Update Dashboard
  document.getElementById("totalValue").textContent = fmtMoney(totalValue);
  document.getElementById("totalShares").textContent = totalShares.toLocaleString();
  document.getElementById("totalDividend").textContent = fmtMoney(totalDiv);
  document.getElementById("totalYearDividend").textContent = fmtMoney(totalYearDiv);

  // Re-bind inputs
  document.querySelectorAll(".shares-input").forEach(inp => {
    inp.oninput = (e) => {
      holdings[e.target.dataset.id] = parseFloat(e.target.value) || 0;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(holdings));
      renderAll();
    };
  });
}

function downloadICS(id) {
  const etf = ETFS.find(x => x.id === id);
  const s = holdings[id] || 0;
  const amt = Math.round(s * 1000 * etf.dividend);
  const ics = [
    "BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//Cosmic//TW",
    "BEGIN:VEVENT", `SUMMARY:💰 ${id} 股息入帳 ${fmtMoney(amt)}`,
    `DTSTART;VALUE=DATE:${etf.payDate.replace(/-/g,'')}`,
    `DESCRIPTION:持有 ${s} 張，每股配 ${etf.dividend}`, "END:VEVENT",
    "END:VCALENDAR"
  ].join("\r\n");
  const blob = new Blob([ics], {type: "text/calendar"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `${id}_dividend.ics`;
  a.click();
}

// Initial Load
window.onload = () => {
  renderAll();
  refreshPrices(); // 啟動時自動刷新一次
  setInterval(refreshPrices, 300000); // 每 5 分鐘自動刷新
};

document.getElementById('refreshBtn').onclick = refreshPrices;

</script>
</body>
</html>
