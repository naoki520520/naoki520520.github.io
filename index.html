
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✨ 宇宙股息追蹤器 · Neon Edition</title>
<style>
  :root {
    --bg-deep: #050016;
    --glass-bg: rgba(255, 255, 255, 0.08);
    --glass-border: rgba(255, 255, 255, 0.15);
    --text-primary: #f5f3ff;
    --text-muted: #a8a4c7;
    --accent-pink: #ff4fd8;
    --accent-purple: #9945ff;
    --accent-cyan: #00e5ff;
    --accent-gold: #ffd26f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, "PingFang TC", "Noto Sans TC", sans-serif;
    color: var(--text-primary);
    background: var(--bg-deep);
    padding: 20px 16px 100px;
    min-height: 100vh;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(circle at 15% 15%, rgba(153, 69, 255, 0.15), transparent 40%),
      radial-gradient(circle at 85% 85%, rgba(255, 79, 216, 0.1), transparent 40%),
      #050016;
    z-index: -1;
  }

  .wrap { max-width: 500px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 20px; }
  header h1 { font-size: 24px; font-weight: 800; text-shadow: 0 0 15px var(--accent-pink); }
  header .sub { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; }

  /* Dashboard */
  .dashboard {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .dash-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  
  /* 總市值螢光效果 */
  .dash-total { 
    font-size: 32px; 
    font-weight: 800; 
    color: #fff; 
    margin-bottom: 12px;
    text-shadow: 0 0 10px rgba(255,255,255,0.5), 0 0 20px rgba(255, 210, 111, 0.3);
  }
  
  .btn-refresh {
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    cursor: pointer;
  }
  .btn-refresh.loading svg { animation: spin 1s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .dash-info { display: grid; grid-template-columns: 1fr 1.2fr; gap: 10px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .dash-item .l { font-size: 10px; color: var(--text-muted); margin-bottom: 2px; }
  .dash-item .v { font-size: 14px; font-weight: 700; color: var(--accent-cyan); }

  .dash-year { padding-top: 12px; display: flex; justify-content: space-between; align-items: center; }
  .year-l { font-size: 11px; color: var(--text-muted); }
  
  /* 預估年股息螢光效果 */
  .year-v { 
    font-size: 22px; 
    font-weight: 800; 
    color: var(--accent-gold); 
    text-shadow: 0 0 8px rgba(255, 210, 111, 0.6), 0 0 15px rgba(255, 210, 111, 0.3);
  }

  /* Cards */
  .card {
    background: var(--glass-bg);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid var(--glass-border);
    border-radius: 22px;
    padding: 18px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent); }
  .c-0056 { --accent: var(--accent-pink); --accent-glow: rgba(255, 79, 216, 0.6); }
  .c-00878 { --accent: var(--accent-cyan); --accent-glow: rgba(0, 229, 255, 0.6); }
  .c-00919 { --accent: var(--accent-purple); --accent-glow: rgba(153, 69, 255, 0.6); }

  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
  .card-title { font-size: 20px; font-weight: 900; }
  .price-tag { background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 10px; font-size: 13px; cursor: pointer; }
  .price-tag b { color: var(--accent-gold); }

  .input-row {
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    margin-bottom: 15px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .input-row label { font-size: 12px; color: var(--text-muted); flex: 1; }
  .input-row input {
    background: transparent;
    border: none;
    color: #fff;
    text-align: right;
    font-size: 20px;
    font-weight: 700;
    width: 120px;
    outline: none;
    font-family: inherit;
  }

  .history { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 10px; margin-bottom: 15px; }
  .hist-title { font-size: 10px; color: var(--text-muted); margin-bottom: 8px; text-align: center; }
  .hist-flex { display: flex; gap: 5px; }
  .hist-item { flex: 1; text-align: center; background: rgba(0,0,0,0.2); padding: 6px 2px; border-radius: 8px; }
  .hist-item .q { display: block; font-size: 8px; color: var(--text-muted); margin-bottom: 2px; }
  .hist-item .v { font-size: 11px; font-weight: 700; color: var(--accent-cyan); }

  .card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
  .stat-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; }
  .stat-item .l { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
  .stat-item .v { font-size: 14px; font-weight: 600; }
  
  /* 持股市值螢光效果 */
  .mkt-val {
    color: #fff;
    text-shadow: 0 0 10px var(--accent-glow);
  }

  .card-estimate {
    background: linear-gradient(135deg, rgba(255,79,216,0.1), rgba(0,229,255,0.1));
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 15px;
    padding: 15px;
    text-align: center;
  }
  .est-label { font-size: 11px; color: var(--text-muted); margin-bottom: 5px; }
  
  /* 本次預估可領螢光效果 */
  .cur-div-val { 
    font-size: 24px; 
    font-weight: 800; 
    color: #fff;
    text-shadow: 0 0 10px rgba(255,255,255,0.4), 0 0 20px var(--accent-glow);
  }
  .est-year { font-size: 10px; color: var(--text-muted); margin-top: 5px; }

  .btn-ics {
    width: 100%; margin-top: 12px; padding: 14px; border-radius: 14px; border: none;
    background: var(--accent); color: #fff; font-weight: 700; font-size: 14px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }

  footer { text-align: center; font-size: 10px; color: var(--text-muted); margin-top: 30px; line-height: 1.6; }

  #toast {
    position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
    padding: 10px 20px; border-radius: 25px; font-size: 13px; z-index: 1000;
    display: none; backdrop-filter: blur(10px); color: #fff;
  }
</style>
</head>
<body>

<div id="toast"></div>

<div class="wrap">
  <header>
    <h1>✨ 宇宙股息追蹤器</h1>
    <div class="sub">REAL-TIME TRACKER · NEON BLOOM</div>
  </header>

  <div class="dashboard">
    <div class="dash-top">
      <div class="dash-label">💎 投資組合總市值</div>
      <button class="btn-refresh" id="refreshBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
      </button>
    </div>
    <div class="dash-total" id="totalValue">NT$ 0</div>
    <div class="dash-info">
      <div class="dash-item">
        <div class="l">📦 總張數</div>
        <div class="v" id="totalShares">0</div>
      </div>
      <div class="dash-item">
        <div class="l">💰 本季預估股息</div>
        <div class="v" id="totalDividend">NT$ 0</div>
      </div>
    </div>
    <div class="dash-year">
      <div class="year-l">🌟 預估年股息收入 (回測)</div>
      <div class="year-v" id="totalYearDividend">NT$ 0</div>
    </div>
    <div style="font-size:9px; color:var(--text-muted); text-align:right; margin-top:10px; opacity:0.6;" id="lastUpdate">
      最後更新：尚未更新價格
    </div>
  </div>

  <div id="cards"></div>

  <footer>
    資料來源：Gemini AI 即時報價<br>
    ⚡ 螢光視覺優化 · 數據自動儲存<br>
    點擊市價可手動修正價格
  </footer>
</div>

<script>
const apiKey = "";
const ETFS = [
  {
    id: "0056", name: "元大高股息", price: 39.41, div: 1.00, ex: "04-23", pay: "05-14",
    history: [{q: "25Q2", v: 1.07}, {q: "25Q3", v: 1.07}, {q: "25Q4", v: 0.866}, {q: "26Q1", v: 0.866}]
  },
  {
    id: "00878", name: "國泰永續高股息", price: 21.81, div: 0.42, ex: "05-19", pay: "06-16",
    history: [{q: "25Q1", v: 0.47}, {q: "25Q2", v: 0.40}, {q: "25Q3", v: 0.40}, {q: "25Q4", v: 0.42}]
  },
  {
    id: "00919", name: "群益台灣精選高息", price: 22.92, div: 0.78, ex: "06-16", pay: "07-14",
    history: [{q: "25Q2", v: 0.72}, {q: "25Q3", v: 0.54}, {q: "25Q4", v: 0.54}, {q: "26Q1", v: 0.78}]
  }
];

const STORAGE_KEY = "etf_pro_holdings_v4";
let holdings = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");

// --- 核心邏輯 ---

function fmt(n) { return Math.round(n).toLocaleString(); }
function getYearlySum(etf) { return etf.history.reduce((a, b) => a + b.v, 0); }

function updateCalculations() {
  let totalV = 0, totalS = 0, totalD = 0, totalYD = 0;

  ETFS.forEach(etf => {
    const s = holdings[etf.id] || 0;
    const stocks = s * 1000;
    const mktV = stocks * etf.price;
    const curD = stocks * etf.div;
    const yearD = stocks * getYearlySum(etf);

    totalV += mktV;
    totalS += s;
    totalD += curD;
    totalYD += yearD;

    const card = document.querySelector(`.c-${etf.id}`);
    if (card) {
      card.querySelector('.price-val').textContent = etf.price.toFixed(2);
      card.querySelector('.mkt-val').textContent = `NT$ ${fmt(mktV)}`;
      card.querySelector('.cur-div-val').textContent = `NT$ ${fmt(curD)}`;
      card.querySelector('.year-div-val').textContent = `年估收入 NT$ ${fmt(yearD)}`;
    }
  });

  document.getElementById("totalValue").textContent = `NT$ ${fmt(totalV)}`;
  document.getElementById("totalShares").textContent = totalS.toLocaleString();
  document.getElementById("totalDividend").textContent = `NT$ ${fmt(totalD)}`;
  document.getElementById("totalYearDividend").textContent = `NT$ ${fmt(totalYD)}`;
}

function initialRender() {
  const container = document.getElementById("cards");
  container.innerHTML = "";
  
  ETFS.forEach(etf => {
    const s = holdings[etf.id] || 0;
    const yearlySum = getYearlySum(etf);

    const div = document.createElement("div");
    div.className = `card c-${etf.id}`;
    div.innerHTML = `
      <div class="card-header">
        <div class="card-title">${etf.id} <span style="font-size:12px; color:var(--text-muted); font-weight:400">${etf.name}</span></div>
        <div class="price-tag" onclick="manual('${etf.id}')">市價 <b>$<span class="price-val">${etf.price.toFixed(2)}</span></b></div>
      </div>
      
      <div class="input-row">
        <label>持有張數</label>
        <input type="number" step="0.01" inputmode="decimal" value="${s || ""}" placeholder="0" 
               oninput="updateHold('${etf.id}', this.value)">
        <span style="font-size:12px; margin-left:8px">張</span>
      </div>

      <div class="history">
        <div class="hist-title">最近四次配息回測 (合計 $${yearlySum.toFixed(3)})</div>
        <div class="hist-flex">
          ${etf.history.map(h => `<div class="hist-item"><span class="q">${h.q}</span><span class="v">$${h.v.toFixed(2)}</span></div>`).join('')}
        </div>
      </div>

      <div class="card-stats">
        <div class="stat-item"><div class="l">💎 持股市值</div><div class="v mkt-val">NT$ 0</div></div>
        <div class="stat-item"><div class="l">📅 除息日期</div><div class="v">${etf.ex}</div></div>
      </div>

      <div class="card-estimate">
        <div class="est-label">本次預估可領</div>
        <div class="est-val cur-div-val">NT$ 0</div>
        <div class="est-year year-div-val">年估收入 NT$ 0</div>
      </div>

      <button class="btn-ics" onclick="saveIcs('${etf.id}')">🗓️ 加入日曆提醒</button>
    `;
    container.appendChild(div);
  });
  updateCalculations();
}

window.updateHold = (id, val) => {
  holdings[id] = parseFloat(val) || 0;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(holdings));
  updateCalculations();
};

async function handleRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  const status = await fetchPrices();
  if (status) {
    toast("✅ 市價已更新", "rgba(0,200,100,0.9)");
    document.getElementById('lastUpdate').textContent = `最後更新：${new Date().toLocaleTimeString()}`;
    updateCalculations();
  }
  btn.classList.remove('loading');
}

async function fetchPrices() {
  if (!apiKey) {
    ETFS.forEach(e => e.price += (Math.random()-0.5)*0.02);
    return true;
  }
  const query = `查 ${ETFS.map(e=>e.id).join(",")} 最新成交價。格式JSON: {"0056":數字,...}`;
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: query }] }],
        tools: [{ "google_search": {} }],
        generationConfig: { responseMimeType: "application/json" }
      })
    });
    const data = await res.json();
    const prices = JSON.parse(data.candidates[0].content.parts[0].text);
    ETFS.forEach(e => { if(prices[e.id]) e.price = parseFloat(prices[e.id]); });
    return true;
  } catch (e) { return false; }
}

function toast(msg, bg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = bg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

window.manual = (id) => {
  const etf = ETFS.find(x=>x.id===id);
  const p = prompt(`修正 ${id} 市價：`, etf.price);
  if(p && !isNaN(p)) {
    etf.price = parseFloat(p);
    updateCalculations();
  }
};

window.saveIcs = (id) => {
  const etf = ETFS.find(x=>x.id===id);
  const s = holdings[id] || 0;
  if(!s) return toast("⚠️ 請輸入張數", "rgba(255,100,100,0.9)");
  const d = `2026${etf.pay.replace('-','')}`;
  const ics = `BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nSUMMARY:💰 ${etf.id} 股息 NT$${fmt(s*1000*etf.div)}\nDTSTART;VALUE=DATE:${d}\nEND:VEVENT\nEND:VCALENDAR`;
  const blob = new Blob([ics], {type:"text/calendar"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = `${id}.ics`; a.click();
};

document.getElementById('refreshBtn').onclick = handleRefresh;

initialRender();
setTimeout(handleRefresh, 1000);
</script>
</body>
</html>
