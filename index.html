<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ ETF 股息追蹤器 · Cosmic Dividend</title>
<style>
  :root {
    --bg-deep: #050016;
    --glass-bg: rgba(255, 255, 255, 0.06);
    --glass-border: rgba(255, 255, 255, 0.18);
    --text-primary: #f5f3ff;
    --text-muted: #a8a4c7;
    --accent-pink: #ff4fd8;
    --accent-purple: #9945ff;
    --accent-cyan: #00e5ff;
    --accent-gold: #ffd26f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    font-family: -apple-system, "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    color: var(--text-primary);
    background: var(--bg-deep);
    overflow-x: hidden;
    position: relative;
    padding: 24px 16px 60px;
  }
  /* 星空 + 漸層背景 */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(153, 69, 255, 0.45), transparent 55%),
      radial-gradient(ellipse at 85% 20%, rgba(255, 79, 216, 0.4), transparent 55%),
      radial-gradient(ellipse at 70% 85%, rgba(0, 229, 255, 0.35), transparent 55%),
      radial-gradient(ellipse at 10% 90%, rgba(255, 210, 111, 0.25), transparent 55%),
      linear-gradient(180deg, #050016 0%, #0b0030 50%, #050016 100%);
    z-index: -2;
    animation: drift 20s ease-in-out infinite alternate;
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20px 30px, #fff, transparent),
      radial-gradient(1px 1px at 40px 70px, #fff, transparent),
      radial-gradient(1px 1px at 50px 160px, #fff, transparent),
      radial-gradient(1px 1px at 90px 40px, #fff, transparent),
      radial-gradient(2px 2px at 130px 80px, #fff, transparent),
      radial-gradient(1px 1px at 160px 120px, #fff, transparent),
      radial-gradient(1px 1px at 200px 50px, #fff, transparent);
    background-repeat: repeat;
    background-size: 220px 220px;
    opacity: 0.4;
    z-index: -1;
    animation: twinkle 4s ease-in-out infinite alternate;
  }
  @keyframes drift {
    0% { transform: scale(1) translate(0,0); }
    100% { transform: scale(1.05) translate(-10px,-10px); }
  }
  @keyframes twinkle {
    0% { opacity: 0.3; }
    100% { opacity: 0.6; }
  }

.wrap { max-width: 820px; margin: 0 auto; }

header {
text-align: center;
padding: 16px 8px 28px;
}
header h1 {
font-size: 26px;
font-weight: 800;
letter-spacing: 1px;
background: linear-gradient(135deg, #ff4fd8 0%, #9945ff 40%, #00e5ff 100%);
-webkit-background-clip: text;
background-clip: text;
color: transparent;
margin-bottom: 6px;
}
header .sub {
font-size: 13px;
color: var(–text-muted);
letter-spacing: 0.5px;
}

/* 總覽儀表板 */
.dashboard {
backdrop-filter: blur(24px) saturate(160%);
-webkit-backdrop-filter: blur(24px) saturate(160%);
background: var(–glass-bg);
border: 1px solid var(–glass-border);
border-radius: 24px;
padding: 20px 18px;
margin-bottom: 24px;
box-shadow: 0 8px 40px rgba(153, 69, 255, 0.18);
position: relative;
overflow: hidden;
}
.dashboard::before {
content: “”;
position: absolute;
inset: 0;
background: linear-gradient(135deg, rgba(255, 79, 216, 0.12), transparent 50%, rgba(0, 229, 255, 0.12));
pointer-events: none;
}
.dash-title {
font-size: 12px;
color: var(–text-muted);
letter-spacing: 2px;
margin-bottom: 8px;
position: relative;
}
.dash-total {
font-size: 34px;
font-weight: 800;
background: linear-gradient(135deg, #ffd26f, #ff4fd8, #9945ff);
-webkit-background-clip: text;
background-clip: text;
color: transparent;
position: relative;
margin-bottom: 4px;
}
.dash-sub {
display: flex;
gap: 16px;
flex-wrap: wrap;
font-size: 13px;
color: var(–text-muted);
position: relative;
}
.dash-sub span b { color: var(–accent-cyan); font-weight: 600; }

/* ETF 卡片 */
.card {
backdrop-filter: blur(22px) saturate(160%);
-webkit-backdrop-filter: blur(22px) saturate(160%);
background: var(–glass-bg);
border: 1px solid var(–glass-border);
border-radius: 22px;
padding: 20px 18px;
margin-bottom: 20px;
box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
position: relative;
overflow: hidden;
}
.card::before {
content: “”;
position: absolute;
top: 0; left: 0; right: 0;
height: 2px;
background: var(–card-accent, linear-gradient(90deg, #ff4fd8, #9945ff, #00e5ff));
opacity: 0.9;
}
.card[data-id=“0056”] { –card-accent: linear-gradient(90deg, #ff4fd8, #ffd26f); }
.card[data-id=“00878”] { –card-accent: linear-gradient(90deg, #00e5ff, #9945ff); }
.card[data-id=“00919”] { –card-accent: linear-gradient(90deg, #9945ff, #ff4fd8); }

.card-head {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 14px;
flex-wrap: wrap;
gap: 8px;
}
.card-title {
display: flex;
align-items: baseline;
gap: 10px;
}
  .card-code {
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 0 12px rgba(255, 79, 216, 0.8), 0 0 4px rgba(0, 229, 255, 0.6);
  }
.card-name {
font-size: 13px;
color: var(–text-muted);
}
.price-tag {
font-size: 13px;
color: var(–text-primary);
background: rgba(255,255,255,0.08);
border: 1px solid var(–glass-border);
padding: 5px 12px;
border-radius: 999px;
backdrop-filter: blur(10px);
}
.price-tag b { color: var(–accent-gold); font-size: 15px; }

/* 持股輸入區 */
.holding {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 14px;
padding: 12px;
background: rgba(255,255,255,0.04);
border: 1px solid rgba(255,255,255,0.1);
border-radius: 14px;
}
.holding label {
font-size: 12px;
color: var(–text-muted);
white-space: nowrap;
}
.holding input {
flex: 1;
min-width: 0;
background: rgba(0,0,0,0.3);
border: 1px solid rgba(255,255,255,0.15);
border-radius: 10px;
padding: 10px 12px;
color: var(–text-primary);
font-size: 15px;
font-weight: 600;
text-align: right;
outline: none;
transition: all 0.25s;
}
.holding input:focus {
border-color: var(–accent-cyan);
box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.2);
}
.holding .unit { font-size: 12px; color: var(–text-muted); }

/* 資訊格 */
.info-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
margin-bottom: 14px;
}
.info-box {
background: rgba(255,255,255,0.04);
border: 1px solid rgba(255,255,255,0.1);
border-radius: 12px;
padding: 10px 12px;
}
.info-box .label {
font-size: 11px;
color: var(–text-muted);
letter-spacing: 0.5px;
margin-bottom: 4px;
}
.info-box .value {
font-size: 15px;
font-weight: 700;
color: var(–text-primary);
}
.info-box.highlight .value {
background: linear-gradient(135deg, #ffd26f, #ff4fd8);
-webkit-background-clip: text;
background-clip: text;
color: transparent;
}

/* 預估股息亮點 */
.estimate {
background: linear-gradient(135deg, rgba(255,79,216,0.12), rgba(0,229,255,0.12));
border: 1px solid rgba(255,255,255,0.18);
border-radius: 14px;
padding: 14px;
margin-bottom: 14px;
text-align: center;
}
.estimate .label {
font-size: 11px;
color: var(–text-muted);
letter-spacing: 1px;
margin-bottom: 6px;
}
.estimate .amount {
font-size: 26px;
font-weight: 800;
background: linear-gradient(135deg, #ffd26f, #ff4fd8, #9945ff);
-webkit-background-clip: text;
background-clip: text;
color: transparent;
}
.estimate .hint {
font-size: 11px;
color: var(–text-muted);
margin-top: 4px;
}

/* 加入行事曆按鈕 */
.btn-calendar {
width: 100%;
background: linear-gradient(135deg, #9945ff 0%, #ff4fd8 50%, #00e5ff 100%);
background-size: 200% 200%;
border: none;
border-radius: 14px;
padding: 14px;
color: #fff;
font-size: 14px;
font-weight: 700;
letter-spacing: 1px;
cursor: pointer;
box-shadow: 0 6px 20px rgba(153, 69, 255, 0.4);
transition: all 0.3s;
animation: gradientMove 4s ease infinite;
}
@keyframes gradientMove {
0%, 100% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
}
.btn-calendar:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(153, 69, 255, 0.6); }
.btn-calendar:active { transform: translateY(0); }
.btn-calendar:disabled {
opacity: 0.5;
cursor: not-allowed;
animation: none;
}

footer {
text-align: center;
font-size: 11px;
color: var(–text-muted);
margin-top: 24px;
line-height: 1.7;
}

@media (max-width: 380px) {
header h1 { font-size: 22px; }
.dash-total { font-size: 28px; }
.card-code { font-size: 20px; }
}
</style>

</head>
<body>
<div class="wrap">
  <header>
    <h1>✨ 宇宙股息追蹤器</h1>
    <div class="sub">COSMIC DIVIDEND TRACKER · 0056 · 00878 · 00919</div>
  </header>

  <div class="dashboard">
    <div class="dash-title">💎 投資組合總市值</div>
    <div class="dash-total" id="totalValue">NT$ 0</div>
    <div class="dash-sub">
      <span>📦 總張數 <b id="totalShares">0</b></span>
      <span>💰 本季預估股息 <b id="totalDividend">NT$ 0</b></span>
    </div>
  </div>

  <div id="cards"></div>

  <footer>
    ⚡ 資料僅供參考 · 持股資料會自動儲存於本機<br>
    配息資訊以各投信公告為準
  </footer>
</div>

<script>
// ETF 資料（2026/04 更新）
const ETFS = [
  {
    id: "0056",
    name: "元大高股息",
    price: 39.41,
    dividend: 1.00,
    exDate: "2026-04-23",
    payDate: "2026-05-14",
    note: "2026 Q2 配息"
  },
  {
    id: "00878",
    name: "國泰永續高股息",
    price: 21.81,
    dividend: 0.42,
    exDate: "2026-05-19",
    payDate: "2026-06-16",
    note: "2026 Q2 配息（預估，實際以公告為準）"
  },
  {
    id: "00919",
    name: "群益台灣精選高息",
    price: 22.92,
    dividend: 0.78,
    exDate: "2026-06-16",
    payDate: "2026-07-14",
    note: "2026 Q2 配息（預估，實際以公告為準）"
  }
];

const STORAGE_KEY = "cosmic_etf_holdings_v1";

function loadHoldings() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
  } catch (e) { return {}; }
}
function saveHoldings(h) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(h));
}

const holdings = loadHoldings();

function fmtMoney(n) {
  return "NT$ " + Math.round(n).toLocaleString();
}
function fmtDate(d) {
  // "2026-04-23" → "04/23 (四)"
  const [y, m, day] = d.split("-").map(Number);
  const date = new Date(y, m - 1, day);
  const weeks = ["日","一","二","三","四","五","六"];
  return `${String(m).padStart(2,"0")}/${String(day).padStart(2,"0")} (${weeks[date.getDay()]})`;
}

function renderCards() {
  const container = document.getElementById("cards");
  container.innerHTML = "";
  ETFS.forEach(etf => {
    const shares = holdings[etf.id] || 0;
    const stockCount = shares * 1000;
    const marketValue = stockCount * etf.price;
    const estDividend = stockCount * etf.dividend;

    const card = document.createElement("div");
    card.className = "card";
    card.setAttribute("data-id", etf.id);
    card.innerHTML = `
      <div class="card-head">
        <div class="card-title">
          <div class="card-code">${etf.id}</div>
          <div class="card-name">${etf.name}</div>
        </div>
        <div class="price-tag">市價 <b>$${etf.price}</b></div>
      </div>

      <div class="holding">
        <label>📦 持有張數</label>
        <input type="number" min="0" step="0.001" value="${shares || ""}"
               placeholder="0" data-id="${etf.id}" class="shares-input">
        <span class="unit">張</span>
      </div>

      <div class="info-grid">
        <div class="info-box highlight">
          <div class="label">💎 持股市值</div>
          <div class="value">${fmtMoney(marketValue)}</div>
        </div>
        <div class="info-box">
          <div class="label">🎁 每股配息</div>
          <div class="value">$${etf.dividend.toFixed(3)}</div>
        </div>
        <div class="info-box">
          <div class="label">📅 除息日</div>
          <div class="value">${fmtDate(etf.exDate)}</div>
        </div>
        <div class="info-box">
          <div class="label">💸 發放日</div>
          <div class="value">${fmtDate(etf.payDate)}</div>
        </div>
      </div>

      <div class="estimate">
        <div class="label">本次預估可領股息</div>
        <div class="amount">${fmtMoney(estDividend)}</div>
        <div class="hint">${etf.note}</div>
      </div>

      <button class="btn-calendar" data-id="${etf.id}">
        📆 加入行事曆（除息日 + 發放日）
      </button>
    `;
    container.appendChild(card);
  });

  // 綁定事件
  document.querySelectorAll(".shares-input").forEach(inp => {
    inp.addEventListener("input", e => {
      const id = e.target.getAttribute("data-id");
      const val = parseFloat(e.target.value) || 0;
      holdings[id] = val;
      saveHoldings(holdings);
      renderDashboard();
      // 更新該卡片的顯示值
      updateCardValues(id);
    });
  });

  document.querySelectorAll(".btn-calendar").forEach(btn => {
    btn.addEventListener("click", e => {
      const id = e.target.getAttribute("data-id");
      const etf = ETFS.find(x => x.id === id);
      downloadICS(etf);
    });
  });
}

function updateCardValues(id) {
  const etf = ETFS.find(x => x.id === id);
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (!card || !etf) return;
  const shares = holdings[id] || 0;
  const stockCount = shares * 1000;
  const marketValue = stockCount * etf.price;
  const estDividend = stockCount * etf.dividend;
  card.querySelector(".info-box.highlight .value").textContent = fmtMoney(marketValue);
  card.querySelector(".estimate .amount").textContent = fmtMoney(estDividend);
}

function renderDashboard() {
  let totalValue = 0, totalShares = 0, totalDiv = 0;
  ETFS.forEach(etf => {
    const s = holdings[etf.id] || 0;
    totalShares += s;
    totalValue += s * 1000 * etf.price;
    totalDiv += s * 1000 * etf.dividend;
  });
  document.getElementById("totalValue").textContent = fmtMoney(totalValue);
  document.getElementById("totalShares").textContent = totalShares.toLocaleString(undefined, {maximumFractionDigits: 3});
  document.getElementById("totalDividend").textContent = fmtMoney(totalDiv);
}

// 產生 ICS 檔案
function downloadICS(etf) {
  const shares = holdings[etf.id] || 0;
  const estDiv = Math.round(shares * 1000 * etf.dividend);
  const toICSDate = d => d.replace(/-/g, "") ;
  const now = new Date();
  const stamp = now.toISOString().replace(/[-:]/g,"").split(".")[0] + "Z";

  const events = [
    {
      uid: `${etf.id}-exdate-${etf.exDate}@cosmic`,
      date: toICSDate(etf.exDate),
      title: `🔔 ${etf.id} ${etf.name} 除息日`,
      desc: `每股配息 $${etf.dividend}\\n持有 ${shares} 張\\n預估股息 NT$${estDiv.toLocaleString()}\\n\\n⚠️ 最後買進日為除息日前一交易日`
    },
    {
      uid: `${etf.id}-paydate-${etf.payDate}@cosmic`,
      date: toICSDate(etf.payDate),
      title: `💰 ${etf.id} 股息入帳 NT$${estDiv.toLocaleString()}`,
      desc: `${etf.name}\\n每股配息 $${etf.dividend}\\n持有 ${shares} 張\\n預估入帳 NT$${estDiv.toLocaleString()}`
    }
  ];

  let ics = [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//Cosmic ETF Tracker//TW//ZH",
    "CALSCALE:GREGORIAN",
    "METHOD:PUBLISH"
  ];
  events.forEach(ev => {
    ics.push("BEGIN:VEVENT");
    ics.push("UID:" + ev.uid);
    ics.push("DTSTAMP:" + stamp);
    ics.push("DTSTART;VALUE=DATE:" + ev.date);
    ics.push("DTEND;VALUE=DATE:" + ev.date);
    ics.push("SUMMARY:" + ev.title);
    ics.push("DESCRIPTION:" + ev.desc);
    ics.push("BEGIN:VALARM");
    ics.push("TRIGGER:-P1D");
    ics.push("ACTION:DISPLAY");
    ics.push("DESCRIPTION:" + ev.title);
    ics.push("END:VALARM");
    ics.push("END:VEVENT");
  });
  ics.push("END:VCALENDAR");

  const blob = new Blob([ics.join("\r\n")], {type: "text/calendar;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${etf.id}_dividend.ics`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// 初始化
renderCards();
renderDashboard();
</script>

</body>
</html>
